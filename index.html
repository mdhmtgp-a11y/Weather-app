<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Weather</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <h1 class="logo">☁ SkyCast</h1>

    <div class="search-box">

    <input
        type="text"
        id="cityInput"
        placeholder="Enter city name..."
        autocomplete="off">

    <button id="searchBtn">🔍</button>

    <button id="locationBtn">📍</button>

</div>

<!-- Suggestions -->
<div id="suggestions" class="suggestions"></div>

    <div class="weather-card">

        <h2 id="city">Delhi</h2>

        <p id="dateTime"></p>

        <img id="weatherIcon"
        src="https://openweathermap.org/img/wn/01d@2x.png">

        <h1 id="temp">--°C</h1>

        <p id="condition">Loading...</p>

        <p id="feelsLike">Feels Like --°C</p>

    </div>

    <div class="details">

        <div class="card">
            <h3>💧 Humidity</h3>
            <p id="humidity">--%</p>
        </div>

        <div class="card">
            <h3>💨 Wind</h3>
            <p id="wind">-- km/h</p>
        </div>

        <div class="card">
            <h3>🌡 Pressure</h3>
            <p id="pressure">-- hPa</p>
        </div>

        <div class="card">
            <h3>👁 Visibility</h3>
            <p id="visibility">-- km</p>
        </div>

        <div class="card">
            <h3>🌅 Sunrise</h3>
            <p id="sunrise">--:--</p>
        </div>

        <div class="card">
            <h3>🌇 Sunset</h3>
            <p id="sunset">--:--</p>
        </div>

    </div>

    <div class="forecast">

        <h2>5-Day Forecast</h2>

        <div id="forecastCards"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
