<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <!-- Search -->

    <div class="search-box">

        <input
        type="text"
        id="cityInput"
        placeholder="Search city...">

        <button id="searchBtn">🔍</button>

    </div>

    <!-- Location -->

    <button id="locationBtn">
        📍 Use My Location
    </button>

    <!-- Weather -->

    <div class="weather-box">

        <p id="dateTime"></p>

        <h2 id="city">Kolkata</h2>

        <div class="icon">☀️</div>

        <h1 id="temp">32°C</h1>

        <p id="feels">Feels Like 35°C</p>

        <p id="condition">Sunny</p>

    </div>

    <!-- Main Cards -->

    <div class="details">

        <div class="card">
            <div class="card-icon">💧</div>
            <h3>Humidity</h3>
            <p id="humidity">65%</p>
        </div>

        <div class="card">
            <div class="card-icon">💨</div>
            <h3>Wind Speed</h3>
            <p id="wind">12 km/h</p>
        </div>

    </div>

    <!-- Extra Details -->

    <div class="extra-details">

        <div class="extra-card">
            <span>🌅</span>
            <h4>Sunrise</h4>
            <p id="sunrise">--:--</p>
        </div>

        <div class="extra-card">
            <span>🌇</span>
            <h4>Sunset</h4>
            <p id="sunset">--:--</p>
        </div>

        <div class="extra-card">
            <span>👁️</span>
            <h4>Visibility</h4>
            <p id="visibility">-- km</p>
        </div>

        <div class="extra-card">
            <span>🌡️</span>
            <h4>Pressure</h4>
            <p id="pressure">-- hPa</p>
        </div>

    </div>

    <!-- Forecast -->

    <div class="forecast">

        <h3>5-Day Forecast</h3>

        <div id="forecastCards">

            <!-- JavaScript -->

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

    </html>
