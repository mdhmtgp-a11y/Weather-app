<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <!-- Search Bar -->
    <div class="search-box">
        <input
            type="text"
            id="cityInput"
            placeholder="Search city..."
        >

        <button id="searchBtn">
            🔍
        </button>
    </div>

    <!-- Weather -->
    <div class="weather-box">

        <h2 id="city">Kolkata</h2>

        <div class="icon">
            ☀️
        </div>

        <h1 id="temp">32°C</h1>

        <p id="condition">Sunny</p>

        <div class="details">

            <div class="card">
                <h3>💧 Humidity</h3>
                <p id="humidity">65%</p>
            </div>

            <div class="card">
                <h3>💨 Wind Speed</h3>
                <p id="wind">12 km/h</p>
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
    </html>
